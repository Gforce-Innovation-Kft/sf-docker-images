name: Build and Push Docker Images

on:
  # Build/test/push only on version tags; PRs validate before merge.
  # Pushes to main do not build (avoids a redundant run right before tagging).
  push:
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  packages: write
  security-events: write

env:
  DOCKERHUB_USERNAME: gforceinnovation

jobs:
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    # Non-blocking: requires the repo's Dependency Graph feature to be enabled
    # (Settings -> Security & analysis). Runs and reports once enabled, but never
    # blocks a PR when the feature is off.
    continue-on-error: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  build:
    name: Build Docker Images
    runs-on: ubuntu-latest
    permissions:
      contents: read

    strategy:
      matrix:
        image:
          - name: sf-devcontainer
            context: ./sf-devcontainer
          - name: sf-ci
            context: ./sf-ci
          - name: sf-bulk
            context: ./sf-bulk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          load: true
          tags: ${{ matrix.image.name }}:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Report image size
        run: |
          SIZE=$(docker image inspect ${{ matrix.image.name }}:test --format='{{.Size}}')
          echo "## ${{ matrix.image.name }}" >> $GITHUB_STEP_SUMMARY
          echo "Image size: $(numfmt --to=iec-i --suffix=B $SIZE)" >> $GITHUB_STEP_SUMMARY

      - name: Export Docker image
        run: |
          docker save ${{ matrix.image.name }}:test | gzip > ${{ matrix.image.name }}.tar.gz

      - name: Upload image artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.image.name }}-image
          path: ${{ matrix.image.name }}.tar.gz
          retention-days: 1

  test:
    name: Test Docker Images
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      checks: write
      pull-requests: write
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        image:
          - name: sf-devcontainer
          - name: sf-ci
          - name: sf-bulk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.image.name }}-image

      - name: Load Docker image
        run: |
          docker load < ${{ matrix.image.name }}.tar.gz

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: |
          pip install -r tests/requirements.txt

      - name: Run tests for ${{ matrix.image.name }}
        run: |
          TEST_FILE=test_$(echo "${{ matrix.image.name }}" | tr '-' '_').py
          pytest tests/${TEST_FILE} -v --junitxml=test-results-${{ matrix.image.name }}.xml

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: test-results-${{ matrix.image.name }}.xml
          check_name: Test Results - ${{ matrix.image.name }}

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ matrix.image.name }}:test
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'

  push:
    name: Tag and Push Docker Images
    runs-on: ubuntu-latest
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write

    strategy:
      matrix:
        image:
          - name: sf-devcontainer
            context: ./sf-devcontainer
          - name: sf-ci
            context: ./sf-ci
          - name: sf-bulk
            context: ./sf-bulk

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download image artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.image.name }}-image

      - name: Load Docker image
        run: |
          docker load < ${{ matrix.image.name }}.tar.gz

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/${{ matrix.image.name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=true

      - name: Re-tag and push for multi-platform
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.image.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          sbom: true
          provenance: true

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: push
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract changelog section for this tag
        id: changelog
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          NOTES_FILE="$(mktemp)"
          # Pull the [VERSION] section out of CHANGELOG.md (Keep a Changelog format)
          awk -v ver="$VERSION" '
            /^## \[/ {
              if (found) { exit }
              if (index($0, "[" ver "]")) { found = 1; next }
            }
            found { print }
          ' CHANGELOG.md > "$NOTES_FILE"
          if [ ! -s "$NOTES_FILE" ]; then
            echo "Release ${GITHUB_REF_NAME} — see the auto-generated notes below." > "$NOTES_FILE"
          fi
          echo "notes_file=${NOTES_FILE}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.notes_file }}
          generate_release_notes: true
